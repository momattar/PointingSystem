<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coordinator Dashboard</title>
    <link rel="icon" type="image/png" href="img/Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --blue: #003df4;
            --blue-dk: #0028a0;
            --blue-lt: #e8eeff;
            --ink: #0d1117;
            --ink2: #3d4554;
            --muted: #8c94a6;
            --border: #e4e8f0;
            --bg: #f5f7fb;
            --white: #ffffff;
            --gold: #f5a623;
            --silver: #8e9aaf;
            --bronze: #b87333;
            --green: #16a34a;
            --yellow: #d97706;
            --red: #dc2626;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            font-size: 14px;
            line-height: 1.6;
        }

        /* ── HEADER ─────────────────────────────────────────── */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            height: 32px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -.3px;
        }

        .header-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
        }

        .cycle-badge {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-header {
            height: 34px;
            padding: 0 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--ink2);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all .15s ease;
            text-decoration: none;
        }

            .btn-header:hover {
                background: var(--bg);
                border-color: #c8cfe0;
                color: var(--ink);
            }

            .btn-header.primary {
                background: var(--blue);
                border-color: var(--blue);
                color: white;
            }

                .btn-header.primary:hover {
                    background: var(--blue-dk);
                    border-color: var(--blue-dk);
                }

        /* ── LAYOUT ─────────────────────────────────────────── */
        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* ── STAT CARDS ─────────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            transition: box-shadow .2s ease;
        }

            .stat-card:hover {
                box-shadow: var(--shadow);
            }

        .stat-num {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -.5px;
            color: var(--ink);
            font-family: 'DM Mono', monospace;
            margin-bottom: 2px;
        }

            .stat-num.blue {
                color: var(--blue);
            }

            .stat-num.green {
                color: var(--green);
            }

            .stat-num.yellow {
                color: var(--yellow);
            }

            .stat-num.red {
                color: var(--red);
            }

            .stat-num.muted {
                color: var(--muted);
            }

        .stat-lbl {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .6px;
        }

        /* ── CHART ROW ───────────────────────────────────────── */
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
        }

        .chart-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink2);
            margin-bottom: 16px;
            letter-spacing: -.1px;
        }

        .chart-wrap {
            height: 200px;
            position: relative;
        }

        /* ── TOOLBAR ─────────────────────────────────────────── */
        .toolbar {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

            .search-wrap input {
                width: 100%;
                height: 34px;
                padding: 0 32px 0 12px;
                border: 1px solid var(--border);
                border-radius: 8px;
                font-family: 'DM Sans', sans-serif;
                font-size: 13px;
                color: var(--ink);
                outline: none;
                transition: border-color .15s;
                background: var(--bg);
            }

                .search-wrap input:focus {
                    border-color: var(--blue);
                    background: white;
                }

                .search-wrap input::placeholder {
                    color: var(--muted);
                }

        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 16px;
            display: none;
            line-height: 1;
            padding: 0;
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            flex-shrink: 0;
        }

        .filter-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .chip {
            height: 30px;
            padding: 0 12px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--ink2);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
        }

            .chip:hover {
                border-color: var(--blue);
                color: var(--blue);
            }

            .chip.active {
                background: var(--blue);
                border-color: var(--blue);
                color: white;
            }

        /* ── TABLE ───────────────────────────────────────────── */
        .table-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: var(--ink);
            color: rgba(255,255,255,.7);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .8px;
            text-transform: uppercase;
            padding: 12px 14px;
            text-align: left;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: color .15s;
        }

            thead th:hover {
                color: white;
            }

            thead th .sort-icon {
                margin-left: 4px;
                opacity: .5;
                font-style: normal;
            }

            thead th.sorted .sort-icon {
                opacity: 1;
                color: var(--gold);
            }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .1s;
        }

            tbody tr:last-child {
                border-bottom: none;
            }

            tbody tr:hover {
                background: #f9fafc;
            }

        tbody td {
            padding: 11px 14px;
            font-size: 13px;
            color: var(--ink2);
            vertical-align: middle;
        }

        .td-rank {
            font-family: 'DM Mono', monospace;
            font-weight: 700;
            font-size: 15px;
            width: 50px;
            text-align: center;
        }

        .td-name {
            font-weight: 600;
            color: var(--ink);
            max-width: 200px;
        }

        .td-num {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            text-align: right;
        }

        .td-penalty {
            color: var(--red);
            font-family: 'DM Mono', monospace;
            text-align: right;
        }

            .td-penalty.none {
                color: var(--muted);
            }

        .td-pct {
            font-family: 'DM Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            text-align: right;
        }

        /* medal rows */
        tr.gold-row td {
            background: linear-gradient(90deg, #fffbeb, #fffef8) !important;
        }

        tr.silver-row td {
            background: linear-gradient(90deg, #f8f9fb, #ffffff) !important;
        }

        tr.bronze-row td {
            background: linear-gradient(90deg, #fff8f3, #ffffff) !important;
        }

        tr.gold-row .td-rank {
            color: #b7791f;
        }

        tr.silver-row .td-rank {
            color: #718096;
        }

        tr.bronze-row .td-rank {
            color: var(--bronze);
        }

        /* not enough data */
        tr.not-enough td {
            color: var(--muted) !important;
            font-style: italic;
        }

        tr.not-enough .td-name {
            color: var(--muted) !important;
            font-weight: 400;
        }

        /* separator */
        tr.sep-row td {
            background: var(--bg);
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            padding: 8px 14px;
            border-top: 1px solid var(--border);
        }

        /* performance pill */
        .pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .3px;
            white-space: nowrap;
        }

        .pill-excellent {
            background: #dcfce7;
            color: #15803d;
        }

        .pill-good {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .pill-needs {
            background: #fef9c3;
            color: #a16207;
        }

        .pill-weak {
            background: #fee2e2;
            color: #b91c1c;
        }

        .pill-nodata {
            background: #f1f5f9;
            color: #64748b;
        }

        /* pct bar */
        .pct-bar-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pct-bar {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            min-width: 60px;
        }

        .pct-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width .4s ease;
        }

        /* loading */
        .loading-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 13px;
        }

        /* scroll to top */
        #goUpBtn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 200;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--ink);
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0,0,0,.2);
            transition: all .2s ease;
        }

            #goUpBtn:hover {
                background: var(--blue);
                transform: translateY(-2px);
            }

            #goUpBtn.show {
                display: flex;
            }

        /* highlight */
        .hl {
            background: #fef9c3;
            border-radius: 2px;
            padding: 0 1px;
        }

        /* responsive */
        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .chart-row {
                grid-template-columns: 1fr;
            }

            header {
                padding: 0 16px;
            }

            .page {
                padding: 16px;
            }
        }

        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .header-divider, .cycle-badge {
                display: none;
            }

            .btn-header span {
                display: none;
            }
        }

        @media print {
            header, .toolbar, #goUpBtn, .chart-row, .btn-header {
                display: none !important;
            }

            .page {
                padding: 0;
            }

            .table-card {
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <!-- ── HEADER ──────────────────────────────────────────────── -->
    <header>
        <div class="header-left">
            <img src="img/white.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
            <span class="header-title">Coordinator Dashboard</span>
            <div class="header-divider"></div>
            <span class="cycle-badge" id="cycleRange">Loading…</span>
        </div>
        <div class="header-right">
            <button class="btn-header" id="exportBtn"><span>⬇</span><span>Export</span></button>
            <button class="btn-header" id="refreshBtn"><span>↺</span><span>Refresh</span></button>
            <a href="tutorial.html" class="btn-header primary"><span>📖</span><span>Tutorial</span></a>
        </div>
    </header>

    <!-- ── PAGE ────────────────────────────────────────────────── -->
    <div class="page">

        <!-- loading -->
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <div>Loading data…</div>
        </div>

        <!-- content -->
        <div id="pageContent" style="display:none;">

            <!-- stats -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- charts -->
            <div class="chart-row">
                <div class="chart-card">
                    <div class="chart-title">Performance Distribution</div>
                    <div class="chart-wrap"><canvas id="perfChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Average Score Breakdown</div>
                    <div class="chart-wrap"><canvas id="scoreChart"></canvas></div>
                </div>
            </div>

            <!-- toolbar -->
            <div class="toolbar">
                <div class="search-wrap">
                    <input type="text" id="searchInput" placeholder="Search coordinator…">
                    <button class="search-clear" id="clearSearch">×</button>
                </div>
                <div class="toolbar-sep"></div>
                <div class="filter-chips">
                    <button class="chip active" data-filter="all">All</button>
                    <button class="chip" data-filter="top3">Top 3</button>
                    <button class="chip" data-filter="excellent">Excellent+</button>
                    <button class="chip" data-filter="attention">Needs Attention</button>
                    <button class="chip" data-filter="nodata">Not Enough Data</button>
                </div>
                <div class="toolbar-sep"></div>
                <span id="resultCount" style="font-size:12px;color:var(--muted);white-space:nowrap;"></span>
            </div>

            <!-- table -->
            <div class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th class="td-rank" data-sort="rank">#<i class="sort-icon">↕</i></th>
                            <th data-sort="name">Name<i class="sort-icon">↕</i></th>
                            <th data-sort="totalSessions" style="text-align:right">Sessions<i class="sort-icon">↕</i></th>
                            <th data-sort="attendanceScore" style="text-align:right">Attend.<i class="sort-icon">↕</i></th>
                            <th data-sort="recordsScore" style="text-align:right">Records<i class="sort-icon">↕</i></th>
                            <th data-sort="materialsScore" style="text-align:right">Materials<i class="sort-icon">↕</i></th>
                            <th data-sort="penalties" style="text-align:right">Penalties<i class="sort-icon">↕</i></th>
                            <th data-sort="totalPoints" style="text-align:right">Points<i class="sort-icon">↕</i></th>
                            <th data-sort="percentage" style="text-align:right">Score<i class="sort-icon">↕</i></th>
                            <th>Performance</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>

        </div>
    </div>

    <button id="goUpBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyBf8tyh3RQDvEtK3mhwG1LnaFTJNqetB0b2Ns2fJiwy0jLLYhQySSX0Iq8o7fnIXHu/exec';
        const MIN_SESSIONS = 24;

        let allData = [];
        let filteredData = [];
        let sortState = { field: 'rank', asc: true };
        let activeFilter = 'all';
        let perfChart, scoreChart;

        // ── INIT ──────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            loadData();

            document.getElementById('searchInput').addEventListener('input', debounce(applyFilters, 250));
            document.getElementById('clearSearch').addEventListener('click', () => {
                document.getElementById('searchInput').value = '';
                document.getElementById('clearSearch').style.display = 'none';
                applyFilters();
            });
            document.getElementById('searchInput').addEventListener('input', function () {
                document.getElementById('clearSearch').style.display = this.value ? 'block' : 'none';
            });

            document.querySelectorAll('.chip').forEach(c =>
                c.addEventListener('click', function () {
                    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
                    this.classList.add('active');
                    activeFilter = this.dataset.filter;
                    applyFilters();
                })
            );

            document.querySelectorAll('th[data-sort]').forEach(th =>
                th.addEventListener('click', () => {
                    const field = th.dataset.sort;
                    if (sortState.field === field) sortState.asc = !sortState.asc;
                    else { sortState.field = field; sortState.asc = true; }
                    document.querySelectorAll('th[data-sort]').forEach(t => t.classList.remove('sorted'));
                    th.classList.add('sorted');
                    th.querySelector('.sort-icon').textContent = sortState.asc ? '↑' : '↓';
                    applySortAndRender();
                })
            );

            document.getElementById('refreshBtn').addEventListener('click', loadData);
            document.getElementById('exportBtn').addEventListener('click', exportCSV);

            window.addEventListener('scroll', () => {
                document.getElementById('goUpBtn').classList.toggle('show', window.scrollY > 300);
            });
        });

        // ── LOAD ──────────────────────────────────────────────────
        async function loadData() {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('pageContent').style.display = 'none';
            try {
                const res = await fetch(SCRIPT_URL);
                const json = await res.json();
                allData = json.data || [];
                document.getElementById('cycleRange').textContent = `${json.cycleStart} – ${json.cycleEnd}`;
                renderStats();
                renderCharts();
                applyFilters();
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('pageContent').style.display = 'block';
            } catch (e) {
                document.getElementById('loadingState').innerHTML = `
            <div style="color:var(--red);margin-bottom:12px;">Failed to load data.</div>
            <button class="btn-header" onclick="loadData()">Try Again</button>`;
            }
        }

        // ── STATS ─────────────────────────────────────────────────
        function renderStats() {
            const qualified = allData.filter(d => d.qualified);
            const avg = qualified.length
                ? Math.round(qualified.reduce((s, d) => s + d.percentage, 0) / qualified.length)
                : 0;

            document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card">
            <div class="stat-num blue">${allData.length}</div>
            <div class="stat-lbl">Total</div>
          </div>
          <div class="stat-card">
            <div class="stat-num blue">${qualified.length}</div>
            <div class="stat-lbl">Ranked</div>
          </div>
          <div class="stat-card">
            <div class="stat-num green">${qualified.filter(d => d.percentage >= 95).length}</div>
            <div class="stat-lbl">Excellent</div>
          </div>
          <div class="stat-card">
            <div class="stat-num yellow">${qualified.filter(d => d.percentage >= 60 && d.percentage < 75).length}</div>
            <div class="stat-lbl">Needs Work</div>
          </div>
          <div class="stat-card">
            <div class="stat-num red">${qualified.filter(d => d.percentage < 60).length}</div>
            <div class="stat-lbl">Weak</div>
          </div>
          <div class="stat-card">
            <div class="stat-num muted">${allData.filter(d => !d.qualified).length}</div>
            <div class="stat-lbl">Not Enough Data</div>
          </div>`;
        }

        // ── CHARTS ────────────────────────────────────────────────
        function renderCharts() {
            const qualified = allData.filter(d => d.qualified);
            const counts = [
                qualified.filter(d => d.percentage >= 95).length,
                qualified.filter(d => d.percentage >= 75 && d.percentage < 95).length,
                qualified.filter(d => d.percentage >= 60 && d.percentage < 75).length,
                qualified.filter(d => d.percentage < 60).length,
                allData.filter(d => !d.qualified).length,
            ];

            if (perfChart) perfChart.destroy();
            perfChart = new Chart(document.getElementById('perfChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Excellent (95%+)', 'Good (75-94%)', 'Needs Work (60-74%)', 'Weak (<60%)', 'Not Enough Data'],
                    datasets: [{ data: counts, backgroundColor: ['#16a34a', '#1d4ed8', '#d97706', '#dc2626', '#94a3b8'], borderWidth: 0 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '65%',
                    plugins: { legend: { position: 'bottom', labels: { font: { family: 'DM Sans', size: 11 }, padding: 12, boxWidth: 10 } } }
                }
            });

            const avg = field => qualified.length
                ? (qualified.reduce((s, d) => s + d[field], 0) / qualified.length).toFixed(1)
                : 0;

            if (scoreChart) scoreChart.destroy();
            scoreChart = new Chart(document.getElementById('scoreChart'), {
                type: 'bar',
                data: {
                    labels: ['Attendance', 'Records', 'Materials', 'Penalties'],
                    datasets: [{
                        data: [avg('attendanceScore'), avg('recordsScore'), avg('materialsScore'), avg('penalties')],
                        backgroundColor: ['#16a34a', '#1d4ed8', '#d97706', '#dc2626'],
                        borderRadius: 6, borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { family: 'DM Sans', size: 11 } } },
                        y: { grid: { color: '#f1f5f9' }, ticks: { font: { family: 'DM Sans', size: 11 } }, beginAtZero: true }
                    }
                }
            });
        }

        // ── FILTERS ───────────────────────────────────────────────
        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();

            filteredData = allData.filter(d => {
                if (q && !normalize(d.name).includes(normalize(q))) return false;
                if (activeFilter === 'top3') return d.qualified && d.percentage >= allData.filter(x => x.qualified).sort((a, b) => b.percentage - a.percentage)[2]?.percentage;
                if (activeFilter === 'excellent') return d.qualified && d.percentage >= 95;
                if (activeFilter === 'attention') return d.qualified && d.percentage < 75;
                if (activeFilter === 'nodata') return !d.qualified;
                return true;
            });

            applySortAndRender();
        }

        function applySortAndRender() {
            const field = sortState.field;
            filteredData.sort((a, b) => {
                // always keep not-qualified at bottom unless filtering for them
                if (activeFilter === 'all' || activeFilter === 'top3') {
                    if (a.qualified !== b.qualified) return a.qualified ? -1 : 1;
                }
                let va = a[field] ?? 0, vb = b[field] ?? 0;
                if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
                return sortState.asc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
            });
            renderTable();
        }

        // ── TABLE ─────────────────────────────────────────────────
        function renderTable() {
            const tbody = document.getElementById('tbody');
            document.getElementById('resultCount').textContent = `${filteredData.length} coordinator${filteredData.length !== 1 ? 's' : ''}`;

            if (!filteredData.length) {
                tbody.innerHTML = `<tr><td colspan="10" class="empty-state">No coordinators match your search.</td></tr>`;
                return;
            }

            const q = document.getElementById('searchInput').value.trim();
            const qualified = filteredData.filter(d => d.qualified);
            let qualRank = 0;
            let sepInserted = false;
            let html = '';

            filteredData.forEach(d => {
                const isQ = d.qualified;

                // separator
                if (!isQ && !sepInserted && (activeFilter === 'all')) {
                    sepInserted = true;
                    html += `<tr class="sep-row"><td colspan="10">↓ Below ${MIN_SESSIONS}-session threshold — not ranked</td></tr>`;
                }

                let rankCell = '—';
                let rowCls = isQ ? '' : 'not-enough';

                if (isQ) {
                    qualRank++;
                    if (qualRank === 1) { rankCell = '🥇'; rowCls = 'gold-row'; }
                    else if (qualRank === 2) { rankCell = '🥈'; rowCls = 'silver-row'; }
                    else if (qualRank === 3) { rankCell = '🥉'; rowCls = 'bronze-row'; }
                    else { rankCell = qualRank; }
                }

                const pct = isQ ? d.percentage : null;
                const barColor = pct >= 95 ? '#16a34a' : pct >= 75 ? '#1d4ed8' : pct >= 60 ? '#d97706' : '#dc2626';
                const pill = perfPill(d.performance, isQ);
                const nameHtml = q ? highlight(d.name, q) : d.name;
                const penCls = d.penalties > 0 ? 'td-penalty' : 'td-penalty none';

                html += `
            <tr class="${rowCls}">
              <td class="td-rank">${rankCell}</td>
              <td class="td-name">${nameHtml}</td>
              <td class="td-num">${d.totalSessions}</td>
              <td class="td-num">${d.attendanceScore}</td>
              <td class="td-num">${d.recordsScore}</td>
              <td class="td-num">${d.materialsScore}</td>
              <td class="${penCls}">${d.penalties > 0 ? '-' + d.penalties.toFixed(1) : '—'}</td>
              <td class="td-num">${isQ ? d.totalPoints.toFixed(1) : '—'}</td>
              <td>
                ${isQ ? `
                <div class="pct-bar-wrap">
                  <div class="pct-bar"><div class="pct-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
                  <span class="td-pct" style="color:${barColor};min-width:38px;text-align:right">${pct}%</span>
                </div>` : '<span style="color:var(--muted)">—</span>'}
              </td>
              <td>${pill}</td>
            </tr>`;
            });

            tbody.innerHTML = html;
        }

        // ── HELPERS ───────────────────────────────────────────────
        function perfPill(perf, qualified) {
            if (!qualified) return `<span class="pill pill-nodata">Not Enough Data</span>`;
            const map = {
                'Excellent': 'pill-excellent',
                'Good': 'pill-good',
                'Needs Improvement': 'pill-needs',
                'Weak': 'pill-weak',
            };
            return `<span class="pill ${map[perf] || 'pill-nodata'}">${perf}</span>`;
        }

        function normalize(s) {
            return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        }

        function highlight(text, query) {
            const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="hl">$1</span>');
        }

        function debounce(fn, ms) {
            let t;
            return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
        }

        function exportCSV() {
            const headers = ['Rank', 'Name', 'Sessions', 'Attendance', 'Records', 'Materials', 'Penalties', 'Points', 'Percentage', 'Performance'];
            const rows = filteredData.map((d, i) => [
                d.qualified ? i + 1 : '—',
                d.name, d.totalSessions, d.attendanceScore,
                d.recordsScore, d.materialsScore,
                d.penalties, d.totalPoints, d.qualified ? d.percentage + '%' : '—', d.performance
            ]);
            const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
            const a = Object.assign(document.createElement('a'), {
                href: URL.createObjectURL(new Blob([csv], { type: 'text/csv' })),
                download: 'coordinator-rankings.csv'
            });
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
    </script>
</body>
</html>
